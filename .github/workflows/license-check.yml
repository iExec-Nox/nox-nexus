name: License Check

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.ref }}-license-check
  cancel-in-progress: true

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci --omit=dev

      - name: Check dependency licenses
        run: |
          npx license-checker --onlyAllow \
            "MIT;Apache-2.0;ISC;LGPL-3.0-or-later;CC-BY-4.0;UNLICENSED;BSD-3-Clause;0BSD"
