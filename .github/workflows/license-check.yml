name: License Check

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.ref }}-license-check
  cancel-in-progress: true

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Check dependency licenses
        run: |
          npx license-checker --onlyAllow \
            "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Python-2.0;Unlicense"
